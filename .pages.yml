media:
  input: public/media
  output: /media

content:
  - name: landing-pages
    label: Landing Pages
    type: collection
    path: content/landing-pages
    filename: "{fields.slug}.md"
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: subtitle
        label: Subtitle
        type: string
      - name: slug
        label: URL Slug
        type: string
        required: true
      - name: heroImage
        label: Hero Image
        type: image
      - name: heroImageAlt
        label: Hero Image Alt Text
        type: string
      - name: benefits
        label: Benefits
        type: string
        list: true
      - name: sendfoxFormId
        label: SendFox Form ID
        type: string
        required: true
        description: "e.g. m5xz6n/3oe0d9"
      - name: formButtonLabel
        label: Form Button Label
        type: string
        description: "Defaults to Submit"

      - name: metaDescription
        label: Meta Description
        type: string

  - name: tracking
    label: Tracking Settings
    type: file
    path: content/settings/tracking.json
    fields:
      - name: ga4MeasurementId
        label: Google Analytics 4 Measurement ID
        type: string
        description: "e.g. G-XXXXXXXXXX"
      - name: metaPixelId
        label: Meta (Facebook) Pixel ID
        type: string
        description: "e.g. 1234567890"
